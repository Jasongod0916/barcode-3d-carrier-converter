<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D 條碼載具轉換器</title>
  <style>
    :root {
      --bg: #f7f7f3;
      --panel: #ffffff;
      --ink: #1d1f21;
      --muted: #626866;
      --line: #d8ddd8;
      --accent: #0f766e;
      --accent-dark: #0b5d57;
      --warn: #8a4b0f;
      font-family: "Segoe UI", "Noto Sans TC", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 380px) 1fr;
      gap: 22px;
      padding-top: 22px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    .controls {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 7px;
      font-weight: 650;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      border: 1px solid #cbd2cc;
      border-radius: 6px;
      padding: 10px 11px;
      font: inherit;
      color: var(--ink);
      background: #fff;
    }

    input[type="range"] {
      padding: 0;
      accent-color: var(--accent);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 86px;
      gap: 10px;
      align-items: center;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
    }

    .control-section {
      margin: 4px 0 -4px;
      color: #0d4742;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 650;
      font-size: 14px;
    }

    .checkbox-row input {
      width: auto;
      accent-color: var(--accent);
    }

    .warning {
      color: var(--warn);
      font-size: 13px;
      line-height: 1.45;
      padding: 10px 12px;
      border: 1px solid #ead2aa;
      background: #fff8ea;
      border-radius: 6px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding-top: 6px;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 13px;
      color: white;
      background: var(--accent);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { background: var(--accent-dark); }

    button.secondary {
      color: var(--ink);
      background: #e8ece8;
    }

    button.secondary:hover { background: #dce2dd; }

    .preview-wrap {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      align-content: start;
      gap: 16px;
      min-height: 420px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(110px, 1fr));
      gap: 10px;
      align-self: start;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfb;
    }

    .stat b {
      display: block;
      font-size: 18px;
      margin-bottom: 2px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .barcode-stage {
      width: 100%;
      overflow: auto;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(#fff, #f9faf8);
    }

    svg {
      display: block;
      min-width: 100%;
      height: auto;
    }

    .error {
      color: #b42318;
      font-weight: 650;
    }

    @media (max-width: 820px) {
      main { width: min(100vw - 22px, 720px); }
      header { display: block; }
      .layout { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>3D 條碼載具轉換器</h1>
        <p>輸入載具序號或條碼內容，產出可列印的 STL 底板與微凸條紋模型。</p>
      </div>
      <p class="hint">預設格式：Code 39，外觀較接近常見手機條碼載具。</p>
    </header>

    <section class="layout">
      <aside class="panel controls">
        <div class="control-section">快速設定</div>
        <label>
          尺寸預設
          <select id="sizePreset">
            <option value="defaultCard" selected>預設尺寸</option>
            <option value="">自訂尺寸</option>
          </select>
          <span class="hint">選擇後會自動套用底板、條碼、厚度、凸起與圓角參數。</span>
        </label>

        <label>
          載具序號 / 條碼內容
          <input id="barcodeText" value="/1234567" maxlength="48" autocomplete="off">
          <span class="hint">請輸入完整字串，包含開頭的 / 或其他符號；建議不要超過 48 字元。</span>
          <span id="textError" class="error"></span>
        </label>

        <label>
          條碼格式
          <select id="barcodeFormat">
            <option value="code39" selected>Code 39（載具）</option>
            <option value="code128">Code 128</option>
          </select>
          <span class="hint">預設 Code 39（載具）；Code 128 適合一般英數字內容。</span>
        </label>

        <label class="checkbox-row">
          <input id="showCarrierText" type="checkbox">
          顯示載具號碼
        </label>

        <div class="control-section">卡片外形</div>
        <label>
          底板長度
          <div class="row">
            <input id="baseWidth" type="range" min="40" max="120" step="1" value="70">
            <input id="baseWidthValue" type="number" min="40" max="120" step="1" value="70">
          </div>
          <span class="hint">預設 70 mm，兼顧錢包尺寸與條碼可讀性。</span>
        </label>

        <label>
          底板寬度
          <div class="row">
            <input id="baseHeight" type="range" min="25" max="70" step="1" value="54">
            <input id="baseHeightValue" type="number" min="25" max="70" step="1" value="54">
          </div>
          <span class="hint">預設 54 mm，也就是 5.4 cm。</span>
        </label>

        <label>
          卡片圓角
          <div class="row">
            <input id="cornerRadius" type="range" min="0" max="12" step="0.5" value="4">
            <input id="cornerRadiusValue" type="number" min="0" max="12" step="0.5" value="4">
          </div>
          <span class="hint">預設 4 mm，四個角會變圓角。</span>
        </label>

        <label>
          底板厚度
          <div class="row">
            <input id="baseThickness" type="range" min="0.8" max="4" step="0.1" value="1">
            <input id="baseThicknessValue" type="number" min="0.8" max="4" step="0.1" value="1">
          </div>
          <span class="hint">預設 1 mm，較容易放進錢包。</span>
        </label>

        <div class="control-section">條碼區域</div>
        <label>
          條碼長度
          <div class="row">
            <input id="barcodeWidth" type="range" min="35" max="110" step="1" value="50">
            <input id="barcodeWidthValue" type="number" min="35" max="110" step="1" value="50">
          </div>
          <span class="hint">預設 50 mm，適合目前小卡測試尺寸。</span>
        </label>

        <label>
          條碼寬度
          <div class="row">
            <input id="barcodeHeight" type="range" min="10" max="40" step="1" value="15">
            <input id="barcodeHeightValue" type="number" min="10" max="40" step="1" value="15">
          </div>
          <span class="hint">預設 15 mm，也就是 1.5 cm。</span>
        </label>

        <label>
          條紋凸起
          <div class="row">
            <input id="barRelief" type="range" min="0.2" max="1.2" step="0.05" value="0.5">
            <input id="barReliefValue" type="number" min="0.2" max="1.2" step="0.05" value="0.5">
          </div>
          <span class="hint">預設 0.5 mm，接近微凸效果；若掃不到再小幅調高。</span>
        </label>

        <div class="warning">
          沒有 AMS 的話，下載 STL；有 AMS 的話，下載 3MF，匯入 Bambu Studio 後再自行自訂顏色。
        </div>

        <div class="actions">
          <button id="downloadStl">下載合併 STL</button>
          <button id="download3mf">下載 3MF</button>
          <button id="downloadSvg" class="secondary">下載 SVG</button>
        </div>
      </aside>

      <section class="panel preview-wrap">
        <div class="stats">
          <div class="stat"><b id="statWidth">-</b><span>模型寬度</span></div>
          <div class="stat"><b id="statHeight">-</b><span>模型高度</span></div>
          <div class="stat"><b id="statBars">-</b><span>凸起條紋</span></div>
          <div class="stat"><b id="statModules">-</b><span>編碼模組</span></div>
        </div>
        <div class="barcode-stage">
          <svg id="barcodePreview" role="img" aria-label="條碼預覽"></svg>
        </div>
      </section>
    </section>
  </main>

    let current = null;

    function code128BValues(text) {
      if (!text) throw new Error("請輸入條碼內容。");
      const values = [104];
      for (const ch of text) {
        const code = ch.charCodeAt(0);
        if (code < 32 || code > 126) {
          throw new Error("目前支援 ASCII 32-126 字元；請移除不支援的字元。");
        }
        values.push(code - 32);
      }
      let checksum = values[0];
      for (let i = 1; i < values.length; i++) checksum += values[i] * i;
      values.push(checksum % 103, 106);
      return values;
    }

    function modulesFromValues(values) {
      const modules = [];
      for (const value of values) {
        const pattern = CODE128_PATTERNS[value];
        for (let i = 0; i < pattern.length; i++) {
          const width = Number(pattern[i]);
          const dark = i % 2 === 0;
          for (let j = 0; j < width; j++) modules.push(dark ? 1 : 0);
        }
      }
      return modules;
    }

    function code39Modules(text) {
      if (!text) throw new Error("請輸入條碼內容。");
      const normalized = text.toUpperCase();
      if (normalized !== text) {
        throw new Error("Code 39 請使用大寫英文字母、數字與支援符號。");
      }
      const allowed = /^[0-9A-Z .\-$/+%]+$/;
      if (!allowed.test(normalized)) {
        throw new Error("Code 39 支援：大寫 A-Z、0-9、空格與 - . $ / + %。");
      }

      const modules = [];
      const encoded = `*${normalized}*`;
      for (let charIndex = 0; charIndex < encoded.length; charIndex++) {
        const pattern = CODE39_PATTERNS[encoded[charIndex]];
        for (let i = 0; i < pattern.length; i++) {
          const dark = i % 2 === 0;
          const width = pattern[i] === "w" ? 3 : 1;
          for (let j = 0; j < width; j++) modules.push(dark ? 1 : 0);
        }
        if (charIndex < encoded.length - 1) modules.push(0);
      }
      return modules;
    }

      "U": [[0.14,0.92,0.14,0.08],[0.14,0.08,0.86,0.08],[0.86,0.08,0.86,0.92]],
      "V": [[0.14,0.92,0.50,0.08],[0.50,0.08,0.86,0.92]],
      "W": [[0.10,0.92,0.26,0.08],[0.26,0.08,0.50,0.44],[0.50,0.44,0.74,0.08],[0.74,0.08,0.90,0.92]],
      "X": [[0.14,0.92,0.86,0.08],[0.86,0.92,0.14,0.08]],
      "Y": [[0.14,0.92,0.50,0.52],[0.86,0.92,0.50,0.52],[0.50,0.52,0.50,0.08]],
      "Z": [[0.14,0.92,0.86,0.92],[0.86,0.92,0.14,0.08],[0.14,0.08,0.86,0.08]],
      "/": [[0.86,0.92,0.14,0.08]],
      "-": [[0.22,0.50,0.78,0.50]],
      ".": [[0.48,0.08,0.52,0.08]],
      " ": []
    };

    function strokePolygon(x1, y1, x2, y2, width) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const len = Math.hypot(dx, dy) || 1;
      const nx = -dy / len * width / 2;
      const ny = dx / len * width / 2;
      return [[x1 + nx, y1 + ny], [x2 + nx, y2 + ny], [x2 - nx, y2 - ny], [x1 - nx, y1 - ny]];
    }

    function textRects(text, cardWidth, cardHeight, barcodeY, barcodeHeight) {
      const normalized = text.toUpperCase();
      const topStart = barcodeY + barcodeHeight;
      const topGap = Math.max(0, cardHeight - topStart);
      if (!normalized || topGap < 4) return [];

      let charHeight = Math.min(5.5, topGap - 3);
      let charWidth = charHeight * 0.55;
      let gap = charHeight * 0.22;
      let totalWidth = normalized.length * charWidth + Math.max(0, normalized.length - 1) * gap;
      if (totalWidth > cardWidth - 6) {
        const scale = (cardWidth - 6) / totalWidth;
        charHeight *= scale;
        charWidth *= scale;
        gap *= scale;
        totalWidth = normalized.length * charWidth + Math.max(0, normalized.length - 1) * gap;
      }

      const stroke = Math.max(0.28, Math.min(0.45, charHeight * 0.13));
      const startX = (cardWidth - totalWidth) / 2;
      const y = topStart + (topGap - charHeight) / 2;
      const shapes = [];

      for (let charIndex = 0; charIndex < normalized.length; charIndex++) {
        const char = normalized[charIndex];
        const x = startX + charIndex * (charWidth + gap);
        const strokes = STROKE_FONT[char] || STROKE_FONT["-"];
        for (const [x1, y1, x2, y2] of strokes) {
          shapes.push({
            points: strokePolygon(
              x + x1 * charWidth,
              y + y1 * charHeight,
              x + x2 * charWidth,
              y + y2 * charHeight,
              stroke
            )
          });
        }
      }
      return shapes;
    }

    function mergeBars(modules) {
      const bars = [];
      let start = null;
      for (let i = 0; i <= modules.length; i++) {
        if (modules[i] === 1 && start === null) start = i;
        if ((modules[i] !== 1 || i === modules.length) && start !== null) {
          bars.push({ start, width: i - start });
          start = null;
        }
      }
      return bars;
    }

    function readConfig() {
      return {
        text: els.text.value.trim(),
        barcodeFormat: els.barcodeFormat.value,
        showCarrierText: els.showCarrierText.checked,
        baseWidth: Number(els.baseWidth.value),
        baseHeight: Number(els.baseHeight.value),
        cornerRadius: Number(els.cornerRadius.value),
        barcodeWidth: Number(els.barcodeWidth.value),
        barcodeHeight: Number(els.barcodeHeight.value),
        baseThickness: Number(els.baseThickness.value),
        barRelief: Number(els.barRelief.value)
      };
    }

    function modelData() {
      const cfg = readConfig();
      const values = cfg.barcodeFormat === "code128" ? code128BValues(cfg.text) : [];
      const modules = cfg.barcodeFormat === "code128" ? modulesFromValues(values) : code39Modules(cfg.text);
      const bars = mergeBars(modules);
      const width = cfg.baseWidth;
      const height = cfg.baseHeight;
      const barcodeWidth = Math.min(cfg.barcodeWidth, width - 2);
      const barcodeHeight = Math.min(cfg.barcodeHeight, height - 2);
      const moduleWidth = barcodeWidth / modules.length;
      const barcodeX = (width - barcodeWidth) / 2;
      const barcodeY = (height - barcodeHeight) / 2;
      const carrierTextRects = cfg.showCarrierText ? textRects(cfg.text, width, height, barcodeY, barcodeHeight) : [];
      return { cfg, values, modules, bars, barcodeWidth, barcodeHeight, moduleWidth, barcodeX, barcodeY, carrierTextRects, width, height };
    }

    function render() {
      try {
        current = modelData();
        els.textError.textContent = "";
        const { cfg, modules, bars, barcodeHeight, moduleWidth, barcodeX, barcodeY, carrierTextRects, width, height } = current;
        els.statWidth.textContent = `${width.toFixed(1)} mm`;
        els.statHeight.textContent = `${height.toFixed(1)} mm`;
        els.statBars.textContent = String(bars.length);
        els.statModules.textContent = String(modules.length);

        const svg = els.preview;
        svg.innerHTML = "";
        svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
        svg.setAttribute("width", `${Math.max(width * 4, 420)}`);
        svg.setAttribute("height", `${height * 4}`);

        const base = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        base.setAttribute("x", "0");
        base.setAttribute("y", "0");
        base.setAttribute("width", width);
        base.setAttribute("height", height);
        base.setAttribute("rx", Math.min(cfg.cornerRadius, width / 2, height / 2));
        base.setAttribute("ry", Math.min(cfg.cornerRadius, width / 2, height / 2));
        base.setAttribute("fill", "#ffffff");
        base.setAttribute("stroke", "#b7beb8");
        base.setAttribute("stroke-width", "0.35");
        svg.appendChild(base);

        for (const bar of bars) {
          const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          rect.setAttribute("x", barcodeX + bar.start * moduleWidth);
          rect.setAttribute("y", barcodeY);
          rect.setAttribute("width", bar.width * moduleWidth);
          rect.setAttribute("height", barcodeHeight);
          rect.setAttribute("fill", "#151515");
          svg.appendChild(rect);
        }

        for (const textShape of carrierTextRects) {
          const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
          polygon.setAttribute("points", textShape.points.map(([x, y]) => `${x},${height - y}`).join(" "));
          polygon.setAttribute("fill", "#151515");
          svg.appendChild(polygon);
        }
      } catch (error) {
        current = null;
        els.textError.textContent = error.message;
        els.preview.innerHTML = "";
        els.statWidth.textContent = "-";
        els.statHeight.textContent = "-";
        els.statBars.textContent = "-";
        els.statModules.textContent = "-";
      }
    }

    function facet(a, b, c) {
      const ux = b[0] - a[0], uy = b[1] - a[1], uz = b[2] - a[2];
      const vx = c[0] - a[0], vy = c[1] - a[1], vz = c[2] - a[2];
      let nx = uy * vz - uz * vy;
      let ny = uz * vx - ux * vz;
      let nz = ux * vy - uy * vx;
      const len = Math.hypot(nx, ny, nz) || 1;
      nx /= len; ny /= len; nz /= len;
      return `  facet normal ${nx} ${ny} ${nz}
    outer loop
      vertex ${a[0]} ${a[1]} ${a[2]}
      vertex ${b[0]} ${b[1]} ${b[2]}
      vertex ${c[0]} ${c[1]} ${c[2]}
    endloop
  endfacet
`;
    }

    function box(name, x, y, z, w, h, d) {
      const p = [
        [x, y, z], [x + w, y, z], [x + w, y + h, z], [x, y + h, z],
        [x, y, z + d], [x + w, y, z + d], [x + w, y + h, z + d], [x, y + h, z + d]
      ];
      const faces = [
        [0, 2, 1], [0, 3, 2],
        [4, 5, 6], [4, 6, 7],
        [0, 1, 5], [0, 5, 4],
        [1, 2, 6], [1, 6, 5],
        [2, 3, 7], [2, 7, 6],
        [3, 0, 4], [3, 4, 7]
      ];
      return faces.map(([a, b, c]) => facet(p[a], p[b], p[c])).join("");
    }

    function addBoxMesh(mesh, x, y, z, w, h, d) {
      const offset = mesh.vertices.length;
      mesh.vertices.push(
        [x, y, z], [x + w, y, z], [x + w, y + h, z], [x, y + h, z],
        [x, y, z + d], [x + w, y, z + d], [x + w, y + h, z + d], [x, y + h, z + d]
      );
      const faces = [
        [0, 2, 1], [0, 3, 2],
        [4, 5, 6], [4, 6, 7],
        [0, 1, 5], [0, 5, 4],
        [1, 2, 6], [1, 6, 5],
        [2, 3, 7], [2, 7, 6],
        [3, 0, 4], [3, 4, 7]
      ];
      for (const face of faces) {
        mesh.triangles.push(face.map((index) => index + offset));
      }
    }

    function roundedRectPoints(width, height, radius, segments = 8) {
      const r = Math.max(0, Math.min(radius, width / 2, height / 2));
      if (r === 0) return [[0, 0], [width, 0], [width, height], [0, height]];
      const corners = [
        { cx: width - r, cy: r, start: -Math.PI / 2, end: 0 },
        { cx: width - r, cy: height - r, start: 0, end: Math.PI / 2 },
        { cx: r, cy: height - r, start: Math.PI / 2, end: Math.PI },
        { cx: r, cy: r, start: Math.PI, end: Math.PI * 1.5 }
      ];
      const points = [];
      for (const corner of corners) {
        for (let i = 0; i <= segments; i++) {
          const t = corner.start + (corner.end - corner.start) * (i / segments);
          points.push([corner.cx + Math.cos(t) * r, corner.cy + Math.sin(t) * r]);
        }
      }
      return points;
    }

    function extrudedPolygonFacets(points, z, d) {
      let stl = "";
      const n = points.length;
      const bottomCenter = [points.reduce((sum, p) => sum + p[0], 0) / n, points.reduce((sum, p) => sum + p[1], 0) / n, z];
      const topCenter = [bottomCenter[0], bottomCenter[1], z + d];
      for (let i = 0; i < n; i++) {
        const next = (i + 1) % n;
        const b1 = [points[i][0], points[i][1], z];
        const b2 = [points[next][0], points[next][1], z];
        const t1 = [points[i][0], points[i][1], z + d];
        const t2 = [points[next][0], points[next][1], z + d];
        stl += facet(bottomCenter, b2, b1);
        stl += facet(topCenter, t1, t2);
        stl += facet(b1, b2, t2);
        stl += facet(b1, t2, t1);
      }
      return stl;
    }

    function roundedBase(name, width, height, radius, d) {
      return extrudedPolygonFacets(roundedRectPoints(width, height, radius), 0, d);
    }

    function addExtrudedPolygonMesh(mesh, points, z, d) {
      const n = points.length;
      const bottomOffset = mesh.vertices.length;
      for (const [x, y] of points) mesh.vertices.push([x, y, z]);
      const topOffset = mesh.vertices.length;
      for (const [x, y] of points) mesh.vertices.push([x, y, z + d]);
      const bottomCenterIndex = mesh.vertices.length;
      mesh.vertices.push([points.reduce((sum, p) => sum + p[0], 0) / n, points.reduce((sum, p) => sum + p[1], 0) / n, z]);
      const topCenterIndex = mesh.vertices.length;
      mesh.vertices.push([mesh.vertices[bottomCenterIndex][0], mesh.vertices[bottomCenterIndex][1], z + d]);

      for (let i = 0; i < n; i++) {
        const next = (i + 1) % n;
        mesh.triangles.push([bottomCenterIndex, bottomOffset + next, bottomOffset + i]);
        mesh.triangles.push([topCenterIndex, topOffset + i, topOffset + next]);
        mesh.triangles.push([bottomOffset + i, bottomOffset + next, topOffset + next]);
        mesh.triangles.push([bottomOffset + i, topOffset + next, topOffset + i]);
      }
    }

    function meshXml(mesh) {
      const vertices = mesh.vertices
        .map(([x, y, z]) => `<vertex x="${x}" y="${y}" z="${z}"/>`)
        .join("");
      const triangles = mesh.triangles
        .map(([v1, v2, v3]) => `<triangle v1="${v1}" v2="${v2}" v3="${v3}"/>`)
        .join("");
      return `<mesh><vertices>${vertices}</vertices><triangles>${triangles}</triangles></mesh>`;
    }

    function make3mfModelXml() {
      if (!current) throw new Error("沒有可輸出的模型。");
      const { cfg, bars, barcodeHeight, moduleWidth, barcodeX, barcodeY, carrierTextRects, width, height } = current;
      const baseMesh = { vertices: [], triangles: [] };
      const barcodeMesh = { vertices: [], triangles: [] };
      const textMesh = { vertices: [], triangles: [] };
      addExtrudedPolygonMesh(baseMesh, roundedRectPoints(width, height, cfg.cornerRadius), 0, cfg.baseThickness);
      for (const bar of bars) {
        const x = barcodeX + bar.start * moduleWidth;
        const y = barcodeY;
        const w = bar.width * moduleWidth;
        addBoxMesh(barcodeMesh, x, y, cfg.baseThickness, w, barcodeHeight, cfg.barRelief);
      }
      for (const textShape of carrierTextRects) {
        addExtrudedPolygonMesh(textMesh, textShape.points, cfg.baseThickness, cfg.barRelief);
      }
      return `<?xml version="1.0" encoding="UTF-8"?>
<model unit="millimeter" xml:lang="zh-TW" xmlns="http://schemas.microsoft.com/3dmanufacturing/core/2015/02" xmlns:m="http://schemas.microsoft.com/3dmanufacturing/material/2015/02">
  <metadata name="Title">3D Barcode Carrier</metadata>
  <resources>
    <m:basematerials id="1">
      <m:base name="White PLA" displaycolor="#FFFFFFFF"/>
      <m:base name="Black PLA" displaycolor="#111111FF"/>
    </m:basematerials>
    <object id="2" type="model" pid="1" pindex="0">${meshXml(baseMesh)}</object>
    <object id="3" type="model" pid="1" pindex="1">${meshXml(barcodeMesh)}</object>
    <object id="4" type="model" pid="1" pindex="1">${meshXml(textMesh)}</object>
  </resources>
  <build>
    <item objectid="2"/>
    <item objectid="3"/>
    <item objectid="4"/>
  </build>
</model>`;
    }

    function crc32(bytes) {
      let crc = -1;
      for (const byte of bytes) {
        crc ^= byte;
        for (let i = 0; i < 8; i++) {
          crc = (crc >>> 1) ^ (0xedb88320 & -(crc & 1));
        }
      }
      return (crc ^ -1) >>> 0;
    }

    function writeUint16(out, value) {
      out.push(value & 255, (value >>> 8) & 255);
    }

    function writeUint32(out, value) {
      out.push(value & 255, (value >>> 8) & 255, (value >>> 16) & 255, (value >>> 24) & 255);
    }

    function dosTimestamp() {
      const now = new Date();
      const time = (now.getHours() << 11) | (now.getMinutes() << 5) | Math.floor(now.getSeconds() / 2);
      const date = ((now.getFullYear() - 1980) << 9) | ((now.getMonth() + 1) << 5) | now.getDate();
      return { time, date };
    }

    function makeZip(files) {
      const encoder = new TextEncoder();
      const parts = [];
      const central = [];
      let offset = 0;
      const stamp = dosTimestamp();

      for (const file of files) {
        const nameBytes = encoder.encode(file.name);
        const data = typeof file.data === "string" ? encoder.encode(file.data) : file.data;
        const crc = crc32(data);
        const local = [];
        writeUint32(local, 0x04034b50);
        writeUint16(local, 20);
        writeUint16(local, 0);
        writeUint16(local, 0);
        writeUint16(local, stamp.time);
        writeUint16(local, stamp.date);
        writeUint32(local, crc);
        writeUint32(local, data.length);
        writeUint32(local, data.length);
        writeUint16(local, nameBytes.length);
        writeUint16(local, 0);
        parts.push(new Uint8Array(local), nameBytes, data);

        const entry = [];
        writeUint32(entry, 0x02014b50);
        writeUint16(entry, 20);
        writeUint16(entry, 20);
        writeUint16(entry, 0);
        writeUint16(entry, 0);
        writeUint16(entry, stamp.time);
        writeUint16(entry, stamp.date);
        writeUint32(entry, crc);
        writeUint32(entry, data.length);
        writeUint32(entry, data.length);
        writeUint16(entry, nameBytes.length);
        writeUint16(entry, 0);
        writeUint16(entry, 0);
        writeUint16(entry, 0);
        writeUint16(entry, 0);
        writeUint32(entry, 0);
        writeUint32(entry, offset);
        central.push(new Uint8Array(entry), nameBytes);
        offset += local.length + nameBytes.length + data.length;
      }

      const centralSize = central.reduce((sum, part) => sum + part.length, 0);
      const end = [];
      writeUint32(end, 0x06054b50);
      writeUint16(end, 0);
      writeUint16(end, 0);
      writeUint16(end, files.length);
      writeUint16(end, files.length);
      writeUint32(end, centralSize);
      writeUint32(end, offset);
      writeUint16(end, 0);
      return new Blob([...parts, ...central, new Uint8Array(end)], { type: "application/vnd.ms-package.3dmanufacturing-3dmodel+xml" });
    }

    function make3mfBlob() {
      const contentTypes = `<?xml version="1.0" encoding="UTF-8"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="model" ContentType="application/vnd.ms-package.3dmanufacturing-3dmodel+xml"/>
</Types>`;
      const rels = `<?xml version="1.0" encoding="UTF-8"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Target="/3D/3dmodel.model" Id="rel0" Type="http://schemas.microsoft.com/3dmanufacturing/2013/01/3dmodel"/>
</Relationships>`;
      return makeZip([
        { name: "[Content_Types].xml", data: contentTypes },
        { name: "_rels/.rels", data: rels },
        { name: "3D/3dmodel.model", data: make3mfModelXml() }
      ]);
    }

    function makeBaseStl() {
      if (!current) throw new Error("沒有可輸出的模型。");
      const { cfg, width, height } = current;
      let stl = "solid barcode_base\n";
      stl += roundedBase("base", width, height, cfg.cornerRadius, cfg.baseThickness);
      stl += "endsolid barcode_base\n";
      return stl;
    }

    function makeBarsStl() {
      if (!current) throw new Error("沒有可輸出的模型。");
      const { cfg, bars, barcodeHeight, moduleWidth, barcodeX, barcodeY, carrierTextRects } = current;
      let stl = "solid barcode_bars\n";
      for (const bar of bars) {
        const x = barcodeX + bar.start * moduleWidth;
        const y = barcodeY;
        const w = bar.width * moduleWidth;
        stl += box("bar", x, y, cfg.baseThickness, w, barcodeHeight, cfg.barRelief);
      }
      for (const textShape of carrierTextRects) {
        stl += extrudedPolygonFacets(textShape.points, cfg.baseThickness, cfg.barRelief);
      }
      stl += "endsolid barcode_bars\n";
      return stl;
    }

    function makeStl() {
      if (!current) throw new Error("沒有可輸出的模型。");
      const { cfg, bars, barcodeHeight, moduleWidth, barcodeX, barcodeY, carrierTextRects, width, height } = current;
      let stl = "solid barcode_carrier\n";
      stl += roundedBase("base", width, height, cfg.cornerRadius, cfg.baseThickness);
      for (const bar of bars) {
        const x = barcodeX + bar.start * moduleWidth;
        const y = barcodeY;
        const w = bar.width * moduleWidth;
        stl += box("bar", x, y, cfg.baseThickness, w, barcodeHeight, cfg.barRelief);
      }
      for (const textShape of carrierTextRects) {
        stl += extrudedPolygonFacets(textShape.points, cfg.baseThickness, cfg.barRelief);
      }
      stl += "endsolid barcode_carrier\n";
      return stl;
    }

    function download(filename, text, type) {
      const blob = new Blob([text], { type });
      downloadBlob(filename, blob);
    }

    function downloadBlob(filename, blob) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function safeName(text) {
      return text.replace(/[^a-z0-9]+/gi, "_").replace(/^_+|_+$/g, "").slice(0, 32) || "barcode";
    }

    function setControl(range, number, value) {
      range.value = String(value);
      number.value = String(value);
    }

    function applySizePreset() {
      const presets = {
        defaultCard: {
          baseWidth: 70,
          baseHeight: 54,
          barcodeWidth: 50,
          barcodeHeight: 15,
          baseThickness: 1,
          barRelief: 0.5,
          cornerRadius: 4
        },
      };
      const preset = presets[els.sizePreset.value];
      if (!preset) return;
      applyingPreset = true;
      setControl(els.baseWidth, els.baseWidthValue, preset.baseWidth);
      setControl(els.baseHeight, els.baseHeightValue, preset.baseHeight);
      setControl(els.barcodeWidth, els.barcodeWidthValue, preset.barcodeWidth);
      setControl(els.barcodeHeight, els.barcodeHeightValue, preset.barcodeHeight);
      setControl(els.baseThickness, els.baseThicknessValue, preset.baseThickness);
      setControl(els.barRelief, els.barReliefValue, preset.barRelief);
      setControl(els.cornerRadius, els.cornerRadiusValue, preset.cornerRadius);
      applyingPreset = false;
      render();
    }

    function syncPair(range, number) {
      const markCustom = () => {
        if (applyingPreset) return;
        if (els.sizePreset.value) els.sizePreset.value = "";
      };
      const updateFromRange = () => { markCustom(); number.value = range.value; render(); };
      const updateFromNumber = () => {
        markCustom();
        const min = Number(number.min);
        const max = Number(number.max);
        const value = Math.min(max, Math.max(min, Number(number.value)));
        range.value = String(value);
        number.value = String(value);
        render();
      };
      range.addEventListener("input", updateFromRange);
      number.addEventListener("change", updateFromNumber);
    }

    let applyingPreset = false;

    syncPair(els.baseWidth, els.baseWidthValue);
    syncPair(els.baseHeight, els.baseHeightValue);
    syncPair(els.cornerRadius, els.cornerRadiusValue);
    syncPair(els.barcodeWidth, els.barcodeWidthValue);
    syncPair(els.barcodeHeight, els.barcodeHeightValue);
    syncPair(els.baseThickness, els.baseThicknessValue);
    syncPair(els.barRelief, els.barReliefValue);
    els.sizePreset.addEventListener("change", applySizePreset);
    els.barcodeFormat.addEventListener("change", render);
    els.showCarrierText.addEventListener("change", render);
    els.text.addEventListener("input", render);
    els.downloadStl.addEventListener("click", () => {
      render();
      if (!current) return;
      download(`${safeName(current.cfg.text)}_3d_barcode.stl`, makeStl(), "model/stl");
    });
    els.download3mf.addEventListener("click", () => {
      render();
      if (!current) return;
      downloadBlob(`${safeName(current.cfg.text)}_white_base_black_barcode.3mf`, make3mfBlob());
    });
    els.downloadSvg.addEventListener("click", () => {
      render();
      if (!current) return;
      const svgText = new XMLSerializer().serializeToString(els.preview);
      download(`${safeName(current.cfg.text)}_barcode.svg`, svgText, "image/svg+xml");
    });

    render();
  </script>
</body>
</html>
